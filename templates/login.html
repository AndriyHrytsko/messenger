<!DOCTYPE html>
<html lang="uk" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вхід</title>

  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/tailwind-config.js" defer></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-ink-900 border border-ink-800 rounded-2xl p-8 shadow-2xl">
    <div class="flex justify-center mb-6">
      <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-brand-500 to-brand-400 flex items-center justify-center shadow-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6l-8-4z"/></svg>
      </div>
    </div>

    <h1 class="text-2xl font-bold text-center mb-6 tracking-tight">Вхід у систему</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-6 space-y-2">
          {% for category, message in messages %}
            <div class="p-3 rounded-lg text-sm {{ 'bg-red-500/10 text-red-400 border border-red-500/20' if category == 'error' or category == 'danger' else 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' if category == 'success' else 'bg-brand-500/10 text-brand-400 border border-brand-500/20' }}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form action="/login" method="post" class="space-y-5">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div>
        <label for="username" class="block text-sm font-medium text-ink-400 mb-1.5">Ім'я користувача / Email / Телефон</label>
        <input type="text" id="username" name="username" required class="field" autocomplete="username">
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-ink-400 mb-1.5">Пароль</label>
        <input type="password" id="password" name="password" required class="field" autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary w-full mt-2">Увійти</button>
    </form>

    <div class="mt-6 flex flex-col items-center gap-3 text-sm">
      <a href="{{ url_for('forgot_password') }}" class="text-brand-400 hover:text-brand-500 transition-colors">Забули пароль?</a>
      <p class="text-ink-500">Ще не маєте аккаунту? <a href="/register" class="text-brand-400 font-medium hover:text-brand-500 transition-colors">Зареєструватись</a></p>
    </div>
  </div>

</body>
</html>
