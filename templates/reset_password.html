<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Скидання пароля</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <h2>Скидання пароля</h2>
    <form id="reset-password-form" method="POST" action="/reset_password">
      <input type="password" id="password" name="password" placeholder="Новий пароль" required autocomplete="new-password">
      <input type="password" id="confirm_password" name="confirm_password" placeholder="Підтвердіть пароль" required autocomplete="new-password">
      <button type="submit">Скинути пароль</button>
    </form>
  </div>
  <script src="/script.js"></script>
</body>
</html>
