<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Месенджер</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"
        integrity="sha384-/KNQL8Nu5gCHLqwqfQjA689Hhoqgi2S84SNUxC3roTe4EhJ9AfLkp8QiQcU8AMzI"
        crossorigin="anonymous" defer></script>
  <script src="/static/scriptic.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app" data-user="{{ session['user'] }}" data-user-id="{{ session['user_id'] }}">
    <header>
      <div class="header-left"><h1>Месенджер</h1></div>
      <div class="header-right">
        <a href="/profile"><div class="avatar">{{ session['user'][0] }}</div></a>
        <form id="logout-form" action="/logout" method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" id="logoutButton">Вийти</button>
        </form>
      </div>
    </header>

    <div class="main-container">
      <aside id="users-list">
        <h2>Контакти</h2>
        <ul id="contacts"></ul>
        <form id="add-friend-form">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <input type="text" id="friend-username" placeholder="Введіть ім’я користувача" required />
          <button type="submit">Додати</button>
        </form>
        <hr style="margin: 15px 0;">
        <h2>Групи</h2>
        <ul id="groups"></ul>
        <form id="create-group-form">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <input type="text" id="group-name" placeholder="Назва групи" required style="width: 90%; margin-bottom: 5px;"/>
          <p style="font-size: 11px; margin: 0 0 5px 0;">Учасники (Ctrl+Клік):</p>
          <select id="group-members-select" multiple style="width: 100%; height: 60px; margin-bottom: 5px;"></select>
          <button type="submit" style="width: 100%;">Створити групу</button>
        </form>
      </aside>

      <section id="chat-window" class="chat-window hidden">
        <div class="chat-header" style="display: flex; justify-content: space-between; align-items: center;">
          <h2>Чат з: <span id="chat-username" class="clickable-name" title="Натисніть для деталей" style="cursor: pointer; color: #007bff; text-decoration: underline;"></span></h2>
          <button id="leave-group-btn" class="hidden" style="background-color: #dc3545; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer;">🚪 Вийти з групи</button>
        </div>
        <div id="fingerprint" class="fingerprint"></div>
        <div id="messages" class="chat-messages"></div>
        <form id="message-form" class="chat-form">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <input type="hidden" id="reply-to" name="reply_to" value="" />
          <input type="text" id="message-input" placeholder="Введіть повідомлення" required />
          <input type="file" id="media-input" accept="*/*" style="display:none" />
          <button type="button" id="media-button">Прикріпити</button>
          <button type="submit">Відправити</button>
        </form>
      </section>
    </div>
  </div>
  <div id="user-info-modal" class="modal hidden">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <div class="avatar" id="modal-avatar" style="margin: 0 auto 10px auto; width: 60px; height: 60px; font-size: 30px;"></div>
      <h2 id="modal-username" style="margin-bottom: 5px;"></h2>
      <p style="color: #555; font-size: 14px;">Email: <span id="modal-email"></span></p>
      <p style="color: #555; font-size: 14px;">Телефон: <span id="modal-phone"></span></p>
      <button id="modal-msg-btn" style="margin-top: 15px; width: 100%;">Написати повідомлення</button>
      <button id="modal-delete-btn" class="hidden" style="margin-top: 10px; width: 100%; background-color: #dc3545; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer;">🗑 Видалити з контактів</button>
    </div>
  </div>

  <div id="group-members-modal" class="modal hidden">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <h2>Учасники групи</h2>
      <ul id="modal-group-list" style="list-style: none; padding: 0; max-height: 200px; overflow-y: auto; text-align: left;"></ul>
    </div>
  </div>
</body>
</html>
