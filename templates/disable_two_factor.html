<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вимкнути 2FA</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <h1>Вимкнути двофакторну автентифікацію</h1>
    <p>Ви впевнені, що хочете вимкнути 2FA?</p>
    <form method="POST" action="/disable_two_factor">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <button type="submit">Вимкнути 2FA</button>
    </form>
  </div>
</body>
</html>
