<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Забули пароль?</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <h2>Відновлення пароля</h2>
    <form method="POST" action="/forgot_password">
      <label for="username">Ім'я користувача</label>
      <input type="text" id="username" name="username" placeholder="Введіть ваше ім'я" required autocomplete="off">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Введіть вашу електронну пошту" required autocomplete="off">
      <button type="submit">Отримати код</button>
    </form>
    <p><a href="{{ url_for('login') }}" class="back-to-login">Повернутись до входу</a></p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-messages">
          {% for category, message in messages %}
            <p class="{{ category }}">{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
  </div>
  <script src="/script.js"></script>
</body>
</html>
