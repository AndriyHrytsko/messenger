<!DOCTYPE html>
<html lang="uk" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Забули пароль?</title>

  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/tailwind-config.js" defer></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-ink-900 border border-ink-800 rounded-2xl p-8 shadow-2xl">
    <h2 class="text-2xl font-bold text-center mb-6 tracking-tight">Відновлення пароля</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-6 space-y-2 text-left">
          {% for category, message in messages %}
            <div class="p-3 rounded-lg text-sm {{ 'bg-red-500/10 text-red-400 border border-red-500/20' if category == 'error' or category == 'danger' else 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' if category == 'success' else 'bg-brand-500/10 text-brand-400 border border-brand-500/20' }}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="/forgot_password" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div>
        <label for="username" class="block text-sm font-medium text-ink-400 mb-1">Ім'я користувача</label>
        <input type="text" id="username" name="username" placeholder="Введіть ваше ім'я" required autocomplete="off" class="field">
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-ink-400 mb-1">Email</label>
        <input type="email" id="email" name="email" placeholder="Введіть вашу електронну пошту" required autocomplete="off" class="field">
      </div>

      <button type="submit" class="btn btn-primary w-full mt-4">Отримати код</button>
    </form>

    <div class="mt-6 text-center">
      <a href="{{ url_for('login') }}" class="text-sm text-brand-400 hover:text-brand-500 transition-colors">← Повернутись до входу</a>
    </div>
  </div>

</body>
</html>
