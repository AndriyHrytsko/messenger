<!DOCTYPE html>
<html lang="uk" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Підтвердження коду</title>

  <link rel="stylesheet" href="/static/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/tailwind-config.js" defer></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-ink-900 border border-ink-800 rounded-2xl p-8 shadow-2xl text-center">
    <h1 class="text-2xl font-bold mb-3 tracking-tight">Підтвердження</h1>
    <p class="text-ink-400 text-sm mb-6">Введіть 6-значний код, який надіслано на вашу електронну пошту.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-6 space-y-2 text-left">
          {% for category, message in messages %}
            <div class="p-3 rounded-lg text-sm {{ 'bg-red-500/10 text-red-400 border border-red-500/20' if category == 'error' or category == 'danger' else 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' if category == 'success' else 'bg-brand-500/10 text-brand-400 border border-brand-500/20' }}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="/verify_code" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="text" name="code" placeholder="Введіть код" required autocomplete="off" class="field text-center tracking-[0.25em] text-lg font-mono">
      <button type="submit" class="btn btn-primary w-full">Підтвердити</button>
    </form>

    <button onclick="window.history.back()" class="btn btn-ghost w-full mt-4">Назад</button>
  </div>

</body>
</html>
