<!DOCTYPE html>
<html lang="uk" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Реєстрація</title>

  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/tailwind-config.js" defer></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 py-8">

  <div class="w-full max-w-md bg-ink-900 border border-ink-800 rounded-2xl p-8 shadow-2xl">
    <h1 class="text-2xl font-bold text-center mb-6 tracking-tight">Реєстрація</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-6 space-y-2">
          {% for category, message in messages %}
            <div class="p-3 rounded-lg text-sm {{ 'bg-red-500/10 text-red-400 border border-red-500/20' if category == 'error' or category == 'danger' else 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' if category == 'success' else 'bg-brand-500/10 text-brand-400 border border-brand-500/20' }}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form id="registerForm" method="POST" action="/register" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div>
        <label for="username" class="block text-sm font-medium text-ink-400 mb-1">Ім'я користувача</label>
        <input type="text" id="username" name="username" value="{{ request.form['username'] if request.form['username'] else '' }}" required class="field">
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-ink-400 mb-1">Email</label>
        <input type="email" id="email" name="email" value="{{ request.form['email'] if request.form['email'] else '' }}" required class="field">
      </div>

      <div>
        <label for="phone" class="block text-sm font-medium text-ink-400 mb-1">Телефон</label>
        <input type="text" id="phone" name="phone" placeholder="+380XXXXXXXXX" value="{{ request.form['phone'] if request.form['phone'] else '' }}" required class="field">
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-ink-400 mb-1">Пароль</label>
        <input type="password" id="password" name="password" required class="field">
      </div>

      <div>
        <label for="confirm_password" class="block text-sm font-medium text-ink-400 mb-1">Підтвердіть пароль</label>
        <input type="password" id="confirm_password" name="confirm_password" required class="field">
      </div>

      <button type="submit" class="btn btn-primary w-full mt-4">Зареєструватись</button>
    </form>

    <div class="mt-6 text-center text-sm">
      <p class="text-ink-500">Вже маєте аккаунт? <a href="/login" class="text-brand-400 font-medium hover:text-brand-500 transition-colors">Увійдіть тут</a>.</p>
    </div>
  </div>

</body>
</html>
