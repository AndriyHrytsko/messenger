<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Реєстрація</title>
  <link rel="stylesheet" href="/static/styles.css">

  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet"
    integrity="sha384-OLBgp1GsljhM2TJ+sbHjaiH9txEUvgdDTAzHv2P24donTt6/529l+9Ua0vFImLlb"
    crossorigin="anonymous"
  />
</head>

<body class="auth-page">
  <div class="auth-container">
    <h1>Реєстрація</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-messages">
          {% for category, message in messages %}
            <p class="{{ category }}">{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    <form id="registerForm" method="POST" action="/register">
      <label for="username">Ім'я користувача:</label>
      <input type="text" id="username" name="username" value="{{ request.form['username'] if request.form['username'] else '' }}" required>
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" value="{{ request.form['email'] if request.form['email'] else '' }}" required>
      <label for="phone">Телефон:</label>
      <input type="text" id="phone" name="phone" placeholder="+380XXXXXXXXX" value="{{ request.form['phone'] if request.form['phone'] else '' }}" required>
      <label for="password">Пароль:</label>
      <input type="password" id="password" name="password" required>
      <label for="confirm_password">Підтвердіть пароль:</label>
      <input type="password" id="confirm_password" name="confirm_password" required>
      <button type="submit">Зареєструватись</button>
    </form>
    <p>Вже маєте аккаунт? <a href="/login">Увійдіть тут</a>.</p>
  </div>
</body>
</html>
